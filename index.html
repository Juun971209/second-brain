<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0f1115" />
<title>My Second Brain</title>
<meta name="description" content="어디서든 메모를 작성해 GitHub 저장소에 바로 저장하는 세컨드 브레인" />
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <span class="brand">🧠 Second Brain</span>
      <div class="nav-actions">
        <button id="settingsToggle" class="icon-btn" aria-label="설정" title="GitHub 연결 설정">⚙️</button>
        <button id="themeToggle" class="icon-btn" aria-label="테마 전환" title="다크/라이트 모드 전환">🌓</button>
      </div>
    </div>
  </header>

  <main>
    <section class="writer">
      <form id="noteForm">
        <div class="field">
          <label for="category">카테고리</label>
          <select id="category" required>
            <option value="clients">clients</option>
            <option value="insights">insights</option>
            <option value="templates">templates</option>
            <option value="study">study</option>
            <option value="prompts">prompts</option>
            <option value="logs">logs</option>
          </select>
        </div>

        <div class="field">
          <label for="title">제목</label>
          <input id="title" type="text" placeholder="제목을 입력하세요" required autocomplete="off" />
        </div>

        <div class="field">
          <label for="content">내용</label>
          <textarea id="content" rows="10" placeholder="마크다운으로 자유롭게 작성하세요..." required></textarea>
        </div>

        <p id="pathPreview" class="path-preview">저장 위치: clients/...</p>

        <button type="submit" id="saveBtn" class="btn btn-primary btn-block">저장</button>
        <p id="statusMsg" class="status-msg" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>저장은 GitHub API를 통해 저장소에 직접 커밋됩니다.</p>
  </footer>

  <!-- Settings Modal -->
  <div id="settingsOverlay" class="overlay" hidden>
    <div class="modal">
      <h2>GitHub 연결 설정</h2>
      <div class="field">
        <label for="ghOwner">저장소 owner</label>
        <input id="ghOwner" type="text" placeholder="Juun971209" />
      </div>
      <div class="field">
        <label for="ghRepo">저장소 이름</label>
        <input id="ghRepo" type="text" placeholder="second-brain" />
      </div>
      <div class="field">
        <label for="ghBranch">브랜치</label>
        <input id="ghBranch" type="text" placeholder="main" />
      </div>
      <div class="field">
        <label for="ghToken">Personal Access Token</label>
        <input id="ghToken" type="password" placeholder="ghp_..." autocomplete="off" />
        <p class="hint">
          이 저장소에 대한 <strong>Contents: Read and write</strong> 권한이 있는 토큰이 필요해요.
          <a href="https://github.com/settings/tokens/new" target="_blank" rel="noopener">토큰 발급하기 ↗</a><br />
          토큰은 이 브라우저의 localStorage에만 저장되며 외부로 전송되지 않습니다 (GitHub API 호출 제외).
        </p>
      </div>
      <div class="modal-actions">
        <button id="settingsCancel" class="btn btn-ghost" type="button">닫기</button>
        <button id="settingsSave" class="btn btn-primary" type="button">저장</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
